# Title: create_volume_and_share.yaml

---
- name: Playbook to create a volume and a CIFS share that points to it. This playbook will also set the autosize mode and enable efficiencies.
  hosts: localhost
  collections:
    - netapp.ontap
    - amazon.aws
  gather_facts: false
  vars_files:
    - variables.yaml
  vars:
    use_lambda: false

  module_defaults:
    group/netapp.ontap.netapp_ontap:
      hostname: "{{ fsxn_hostname }}"
      vserver: "{{ vserver }}"
      validate_certs: false
      use_lambda: "{{ use_lambda | default('true') }}"
      lambda_config:
        aws_profile: "{{ aws_profile | default('default') }}"
        aws_region: "{{ aws_region | default('') }}"
        function_name: "{{ lambda_function_name | default('') }}"

  tasks:
    - name: Ensure required variables are set.
      fail:
        msg: "Required variable {{item}} has not been provided."
      when: vars[item] is undefined
      loop:
        - volume_name
        - volume_size
        - vserver
        - secret_name
        - fsxn_hostname

    - name: Set use_lambda to true if lambda_function_name is provided.
      set_fact:
        use_lambda: true
      when: lambda_function_name is defined

    - name: Ensure that aws_region has been provided if use_lambda is true.
      fail:
        msg: "aws_region must be defined when use_lambda is true."
      when: use_lambda and aws_region is not defined

    - name: Get username and password from AWS secret.
      set_fact:
        username: "{{ lookup('amazon.aws.aws_secret', '{{ secret_name }}.username', nested=true) }}"
        password: "{{ lookup('amazon.aws.aws_secret', '{{ secret_name }}.password', nested=true) }}"
      no_log: true

    - name: Set junction_path to "/<volume_name>" if not provided.
      set_fact:
        junction_path: "/{{ volume_name }}"
      when: junction_path is not defined

    - name: Give efficiency_mode a default if it hasn't already been set.
      set_fact:
        efficiency_mode: "enabled"
      when: efficiency_mode is not defined

    - name: Ensure efficiency_mode is either 'enabled' or 'disabled'
      fail:
        msg: "efficiency_mode must be either 'enabled' or 'disabled'."
      when: efficiency_mode not in ['enabled', 'disabled']

    - name: Ensure autosize_mode is valid if it is defined.
      fail:
        msg: "autosize_mode must be either 'grow', 'grow_shrink', or 'off'."
      when: autosize_mode is defined and autosize_mode not in ['grow', 'off', 'grow_shrink']

    - name: Create the volume
      netapp.ontap.na_ontap_volume:
        state: present
        username: "{{ username }}"
        password: "{{ password }}"

        name: "{{ volume_name }}"
        size: "{{ volume_size }}"
        aggregate_name: "{{ aggr | default('aggr1')}}"
        junction_path: "{{ junction_path }}"
        volume_security_style: "{{ security_style | default('ntfs') }}"
        type: "{{ volume_type | default('rw')}}"
        size_unit: "mb"

    - name: Set Autosize
      netapp.ontap.na_ontap_volume_autosize:
        username: "{{ username }}"
        password: "{{ password }}"

        volume: "{{ volume_name }}"
        mode: "{{ autosize_mode }}"
        maximum_size: "{{ autosize_max_size | default(omit) }}"
        minimum_size: "{{ autosize_min_size | default(omit) }}"
      when: autosize_mode is defined

    - name: Set efficiency of the volume based on the value of efficiency_mode variable.
      netapp.ontap.na_ontap_volume_efficiency:
        state: "{{ 'present' if efficiency_mode == 'enabled' else 'absent' }}"
        username: "{{ username }}"
        password: "{{ password }}"

        volume_name: "{{ volume_name }}"
        enable_data_compaction: "{{ 'true' if efficiency_mode == 'enabled' else 'false' }}"
        enable_inline_compression: "{{ 'true' if efficiency_mode == 'enabled' else 'false' }}"
        enable_inline_dedupe: "{{ 'true' if efficiency_mode == 'enabled' else 'false' }}"

    - name: Create CIFS Share
      netapp.ontap.na_ontap_cifs:
        state: present
        username: "{{ username }}"
        password: "{{ password }}"

        name: "{{ share_name | default(volume_name)}}"
        path: "{{ junction_path }}"
